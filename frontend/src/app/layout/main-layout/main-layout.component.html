<div class="app-shell">
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm sticky-top">
    <div class="container-fluid px-3 px-lg-4">
      <a class="navbar-brand fw-bold d-flex align-items-center gap-2" routerLink="/students">
        <i class="bi bi-mortarboard-fill"></i>
        <span>Student Registration</span>
      </a>
      <button
        class="navbar-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#mainNav"
        aria-controls="mainNav"
        aria-expanded="false"
        aria-label="Toggle navigation"
      >
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item">
            <a class="nav-link" routerLink="/students" routerLinkActive="active">Students</a>
          </li>
          @if (auth.isAdmin()) {
            <li class="nav-item">
              <a class="nav-link" routerLink="/students/new" routerLinkActive="active">Add student</a>
            </li>
          }
        </ul>
        <div class="d-flex align-items-center gap-3 text-white-50 small">
          <span>
            <i class="bi bi-person-circle me-1"></i>
            {{ auth.user()?.username }}
            <span class="badge ms-1" [class.text-bg-warning]="auth.isAdmin()" [class.text-bg-light]="!auth.isAdmin()">
              {{ auth.user()?.role }}
            </span>
          </span>
          <button class="btn btn-outline-light btn-sm" type="button" (click)="auth.logout()">Logout</button>
        </div>
      </div>
    </div>
  </nav>

  <main class="container-fluid px-3 px-lg-4 py-4">
    <router-outlet />
  </main>
</div>
