<div class="admin-shell" [class.sidebar-open]="sidebarOpen()">
  @if (sidebarOpen()) {
    <button
      type="button"
      class="sidebar-backdrop d-lg-none"
      aria-label="Close menu"
      (click)="closeSidebarOnMobile()"
    ></button>
  }

  <aside class="sidebar">
    <div class="sidebar-brand">
      <i class="bi bi-mortarboard-fill"></i>
      <div>
        <strong>SRS Admin</strong>
        <small>Student Registration</small>
      </div>
    </div>

    <nav class="sidebar-nav">
      @for (item of navItems(); track item.route) {
        <a
          class="sidebar-link"
          [routerLink]="item.route"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: item.exact ?? false }"
          (click)="closeSidebarOnMobile()"
        >
          <i class="bi" [class]="item.icon"></i>
          <span>{{ item.label }}</span>
        </a>
      }
    </nav>

    <div class="sidebar-footer">
      <div class="user-chip">
        <i class="bi bi-person-circle"></i>
        <div>
          <span class="fw-semibold">{{ auth.user()?.username }}</span>
          <span class="role-badge" [class.admin]="auth.isAdmin()">{{ auth.user()?.role }}</span>
        </div>
      </div>
      <button type="button" class="btn btn-outline-light btn-sm w-100 mt-2" (click)="auth.logout()">
        <i class="bi bi-box-arrow-right me-1"></i> Logout
      </button>
    </div>
  </aside>

  <div class="main-panel">
    <header class="topbar">
      <div class="d-flex align-items-center gap-2">
        <button type="button" class="btn btn-light btn-icon d-lg-none" (click)="toggleSidebar()">
          <i class="bi bi-list"></i>
        </button>
        <div>
          <h1 class="topbar-title mb-0">{{ pageTitle() }}</h1>
          <small class="text-secondary">Student Registration System</small>
        </div>
      </div>
      <div class="topbar-actions d-none d-md-flex align-items-center gap-2">
        <span class="badge rounded-pill" [class.text-bg-primary]="auth.isAdmin()" [class.text-bg-secondary]="!auth.isAdmin()">
          {{ auth.isAdmin() ? 'Administrator' : 'Guest' }}
        </span>
      </div>
    </header>

    <main class="page-content">
      <router-outlet />
    </main>
  </div>
</div>
