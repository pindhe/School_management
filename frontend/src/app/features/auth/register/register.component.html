<div class="auth-page">
  <div class="auth-card card shadow-lg border-0">
    <div class="card-body p-4 p-md-5">
      <div class="text-center mb-4">
        <h1 class="h3 fw-bold mb-1">Create account</h1>
        <p class="text-secondary mb-0">Register as a guest user to view records</p>
      </div>

      @if (error()) {
        <div class="alert alert-danger" role="alert">{{ error() }}</div>
      }

      <form [formGroup]="form" (ngSubmit)="submit()">
        <div class="mb-3">
          <label class="form-label" for="username">Username</label>
          <input id="username" class="form-control" formControlName="username" />
        </div>
        <div class="mb-3">
          <label class="form-label" for="email">Email</label>
          <input id="email" type="email" class="form-control" formControlName="email" />
        </div>
        <div class="mb-4">
          <label class="form-label" for="password">Password</label>
          <input id="password" type="password" class="form-control" formControlName="password" />
        </div>
        <button class="btn btn-primary btn-lg w-100" type="submit" [disabled]="loading()">
          Register
        </button>
      </form>

      <p class="text-center mt-4 mb-0 text-secondary">
        Already registered?
        <a routerLink="/login" class="fw-semibold">Sign in</a>
      </p>
    </div>
  </div>
</div>
