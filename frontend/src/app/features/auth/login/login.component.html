<div class="auth-page">
  <div class="auth-card card shadow-lg border-0">
    <div class="card-body p-4 p-md-5">
      <div class="text-center mb-4">
        <div class="brand-icon mx-auto mb-3">
          <i class="bi bi-mortarboard-fill"></i>
        </div>
        <h1 class="h3 fw-bold mb-1">Student Registration</h1>
        <p class="text-secondary mb-0">Sign in to manage student records</p>
      </div>

      @if (error()) {
        <div class="alert alert-danger" role="alert">{{ error() }}</div>
      }

      <form [formGroup]="form" (ngSubmit)="submit()">
        <div class="mb-3">
          <label class="form-label" for="username">Username</label>
          <input id="username" class="form-control form-control-lg" formControlName="username" autocomplete="username" />
        </div>
        <div class="mb-4">
          <label class="form-label" for="password">Password</label>
          <input id="password" type="password" class="form-control form-control-lg" formControlName="password" autocomplete="current-password" />
        </div>
        <button class="btn btn-primary btn-lg w-100" type="submit" [disabled]="loading()">
          @if (loading()) {
            <span class="spinner-border spinner-border-sm me-2"></span>
          }
          Sign in
        </button>
      </form>

      <p class="text-center mt-4 mb-0 text-secondary">
        No account?
        <a routerLink="/register" class="fw-semibold">Create one</a>
      </p>

      <div class="demo-box mt-4">
        <small class="text-secondary d-block mb-2">Demo accounts</small>
        <div class="row g-2 small">
          <div class="col-6">
            <span class="badge text-bg-primary">Admin</span> admin / admin123
          </div>
          <div class="col-6">
            <span class="badge text-bg-secondary">Guest</span> guest / guest123
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
