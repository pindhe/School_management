server:
  port: 8080

spring:
  application:
    name: student-registration
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  datasource:
    url: jdbc:h2:mem:studentdb;DB_CLOSE_DELAY=-1;MODE=Oracle
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

app:
  jwt:
    secret: ${JWT_SECRET:StudentRegistrationSystemSecretKeyMustBeAtLeast256BitsLongForHS256}
    expiration-ms: 86400000
  upload:
    dir: uploads/photos

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

---
# Oracle profile: run with -Dspring.profiles.active=oracle
spring:
  config:
    activate:
      on-profile: oracle
  datasource:
    url: jdbc:oracle:thin:@localhost:1521:XE
    driver-class-name: oracle.jdbc.OracleDriver
    username: ${DB_USERNAME:student_app}
    password: ${DB_PASSWORD:student_app}
  jpa:
    hibernate:
      ddl-auto: validate
  h2:
    console:
      enabled: false
